<!DOCTYPE html>
<html>
<head>
    <title>Skill Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h1>🚀 SkillSwap</h1>
    <p>Learn, Teach & Grow with Real People</p>
</div>

<button onclick="shareSite()">📲 Share & Earn</button>

<div class="form">
    <input id="name" placeholder="Your Name">
    <input id="have" placeholder="Skills you have">
    <input id="want" placeholder="Skills you want">

    <button onclick="saveUser()">Submit</button>
</div>

<div id="users"></div>
<div id="matches"></div>

<!-- POPUP -->
<div id="paymentPopup" class="popup">
    <div class="popup-content">
        <h2>Unlock ₹49</h2>

        <button onclick="verifyPayment()">Submit Proof</button>
        <button onclick="closePopup()">Cancel</button>
    </div>
</div>

<!-- IMPORTANT -->
<script src="script.js"></script>

</body>
</html>
